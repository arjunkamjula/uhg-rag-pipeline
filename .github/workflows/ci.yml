name: CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: uhg-rag-pipeline

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint deps
        run: pip install ruff

      - name: Run ruff
        run: ruff check ingestion/ retrieval/ api/ evaluation/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: "postgresql://uhg_user:uhg_pass@localhost:5432/uhg_claims"
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: uhg-claims-rag
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MLFLOW_TRACKING_URI: http://localhost:5000
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: uhg_user
          POSTGRES_PASSWORD: uhg_pass
          POSTGRES_DB: uhg_claims
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .